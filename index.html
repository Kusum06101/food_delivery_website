<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
             background: linear-gradient(to right, rgb(234, 155, 38), rgb(244, 142, 232));
        }
        nav{
            height: 10vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(to right, #fa5d35, #f38c3d);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            border-bottom: magenta solid 3px;
            box-shadow: 0 2px 4px magenta;
        }
        .title{
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        .menu a{
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            margin-right: 80px;

        }
        .icon{
            display: flex;
            align-items: center;
            margin-right: 20px;
        
        }
        section{
            margin-top: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 85vh;
            background: linear-gradient(to right, rgb(234, 155, 38), rgb(244, 142, 232));
            flex-direction: column;

        }
        section main{
            width: 100%;
            height: 50%;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 20px;
        }
        section main div:first-child{
            height: 100%;
            width: 65%;
            font-size: 30px;
            font-weight: bolder;
            color: rgb(255, 255, 255);
            margin-bottom: 20px;
            text-align: start;
        }
        section main div:last-child{
            height: 100%;
            width: 35%;
            display: flex;
            justify-content: center;
            align-items: center;

        } 
        button{
            height: 50px;
            width: 150px;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }
        section aside{
            height: 50%;
            width: 100%;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            padding: 10px;
            background-color: linear-gradient(to right, rgb(234, 155, 38), rgb(244, 142, 232));
        }
        section aside button{
            height: 150px;
            width: 200px;
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 36px;
        }
        section aside button:hover{
            transform: scale(1.05);
            transition: transform 0.3s ease;
            box-shadow: 0 4px 8px red;
        }
        footer{
            height: 5vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
            color: white;
            
        }

        
        


    </style>
</head>
<body>
    <nav>
        <div class="title">PandaFoodCart</div>
        <div class="menu">
            <a href="./index.html">Home</a>
            <a href="./Food.html">Food</a>
            <a href="./cartPage.html">Cart</a>
            <a href="#">Contact</a>
        </div>
        <div class="icon">
            <img src="https://play-lh.googleusercontent.com/MI_8Eof1ZW6o7Q0_7yaiN2Kkyo_U6F_82i2XxYOvvI3re9JRoVCYDI-BiPVkVhL1Yw" alt="" width="55" height="55" style="border-radius: 50%;">

        </div>
    </nav>
    <section>
        <main>
        <div>
            <h1>Welcome to PandaFoodCart</h1>
            <p>Discover delicious meals and order online with ease. Enjoy a wide variety of cuisines delivered right to your doorstep.</p>
            <button>Order Now</button>
        </div>
        <div>
            <img src="https://www.pngall.com/wp-content/uploads/12/Delivery-Scooter-PNG-Clipart.png" alt="foodimage" width="250px" height="200px" style="align-items: center;">
        </div>
        </main>
        <aside>
            <a href="#"><button style="background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://www.shutterstock.com/image-photo/traditional-chicken-biryani-served-brass-600nw-2622739739.jpg'); background-size: cover; ">Biriyani</button></a>
            <a href="#"><button style="background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://png.pngtree.com/thumb_back/fh260/background/20240720/pngtree-taking-slice-picture-of-prepared-delicious-pizza-with-sausage-rings-and-image_15902897.jpg'); background-size: cover;">Pizza</button></a>
            <a href="#"><button style="background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSQf510SZQ1MYXM60cLBLszvtP7Sd-doj_zxQ&s'); background-size: cover;">Burger</button></a>
            <a href="#"><button style="background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQqkPwx8Z9eWHH0EthBadFBa9q_eT2bfkZTtg&s'); background-size: cover;">Salad</button></a>
            <a href="#"><button style="background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://www.shutterstock.com/image-photo/poznan-pol-oct-31-2024-600nw-2542841555.jpg'); background-size: cover;">Drinks</button></a>
            <a href="#"><button style="background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://w0.peakpx.com/wallpaper/325/253/HD-wallpaper-delicious-dessert-nature-delicious-food-dessert.jpg'); background-size: cover;">Desserts</button></a>
            <a href="#"><button style="background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://www.indianhealthyrecipes.com/wp-content/uploads/2023/02/paneer-curry-recipe.jpg'); background-size: cover;">Paneer Food</button></a>
            
        </aside>
    </section>
    <footer>
        <p>&copy; 2023 PandaFoodCart. All rights reserved.</p>
    </footer>
</body>
<script src="./javascript/homePage.js"></script>
</html>
